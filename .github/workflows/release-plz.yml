name: Release-plz

on:
  push:
    branches: [main]

jobs:
  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-pr-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-plz-release:
    name: Release-plz release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
      id-token: write
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      tag: ${{ steps.extract.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - id: release
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - id: extract
        if: steps.release.outputs.releases_created == 'true'
        run: |
          TAG=$(echo '${{ steps.release.outputs.releases }}' | jq -r '.[] | select(.package_name == "throw-trace") | .tag')
          if [ -z "$TAG" ]; then
            echo "throw-trace package not released, skipping npm publish"
            echo "tag=" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build (${{ matrix.target }})
    needs: release-plz-release
    if: needs.release-plz-release.outputs.releases_created == 'true' && needs.release-plz-release.outputs.tag != ''
    strategy:
      fail-fast: true
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04-arm
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-14
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-14
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85
      - name: Add cross-compile target
        run: rustup target add ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }} -p throw-trace
      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../throw-trace-${{ matrix.target }}.tar.gz throw-trace
      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path target\${{ matrix.target }}\release\throw-trace.exe `
            -DestinationPath throw-trace-${{ matrix.target }}.zip
      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: throw-trace-${{ matrix.target }}.*
          retention-days: 1

  github-release:
    name: Attach binaries to GitHub Release
    needs: [release-plz-release, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-plz-release.outputs.tag }}
          files: |
            throw-trace-*.tar.gz
            throw-trace-*.zip
          fail_on_unmatched_files: true

  npm-publish:
    name: Publish npm package
    needs: [release-plz-release, build]
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          merge-multiple: true
          path: artifacts
      - name: Extract binaries into npm/binaries/
        shell: bash
        run: |
          mkdir -p npm/binaries
          for target in x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu \
                        x86_64-apple-darwin aarch64-apple-darwin; do
            tar -xzf "artifacts/throw-trace-${target}.tar.gz" -C npm/binaries
            mv npm/binaries/throw-trace "npm/binaries/throw-trace-${target}"
            chmod +x "npm/binaries/throw-trace-${target}"
          done
          unzip "artifacts/throw-trace-x86_64-pc-windows-msvc.zip" -d npm/binaries
          mv npm/binaries/throw-trace.exe \
             npm/binaries/throw-trace-x86_64-pc-windows-msvc.exe
      - name: Sync version from release tag
        shell: bash
        run: |
          VERSION="${{ needs.release-plz-release.outputs.tag }}"
          VERSION="${VERSION#v}"
          cd npm
          npm version --no-git-tag-version "$VERSION"
      - name: Smoke test launcher
        shell: bash
        run: |
          node npm/lib/index.js --help
          set +e
          OUTPUT=$(THROW_TRACE_FORCE_PLATFORM='aix-x64' node npm/lib/index.js --help 2>&1)
          EXIT=$?
          set -e
          test "$EXIT" -eq 1 || (echo "expected exit 1 for unsupported platform, got $EXIT" && exit 1)
          echo "$OUTPUT" | grep -q 'unsupported platform' \
            || (echo "expected error message containing 'unsupported platform', got: $OUTPUT" && exit 1)
      - name: Publish to npm
        run: npm publish --provenance --access public
        working-directory: npm

  verify-publish:
    name: Verify published package (${{ matrix.os }})
    needs: [release-plz-release, npm-publish]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-22.04-arm, macos-14, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install and run published package
        shell: bash
        run: |
          VERSION="${{ needs.release-plz-release.outputs.tag }}"
          VERSION="${VERSION#v}"
          for i in 1 2 3; do
            if npx -y "throw-trace@${VERSION}" --help; then exit 0; fi
            sleep 10
          done
          exit 1
